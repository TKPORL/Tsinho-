<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>链接聚合页 · 后台管理</title>
    <script src="https://unpkg.com/netlify-cms@^2.10.0/dist/netlify-cms.js"></script>
</head>
<body>
<script>
    // 初始化 Decap CMS (旧称 Netlify CMS)
    CMS.init({
        config: {
            backend: {
                name: 'github',
                repo: '你的GitHub用户名/你的仓库名',   // 待会要改成自己的
                branch: 'main'                       // 默认分支
            },
            media_folder: 'public/images',
            public_folder: '/images',
            collections: [
                {
                    name: 'links',
                    label: '链接管理',
                    label_singular: '链接',
                    folder: '_data',
                    create: true,
                    slug: 'links',
                    fields: [
                        { label: '链接列表', name: 'links', widget: 'list', 
                          fields: [
                              { label: '名称', name: 'name', widget: 'string' },
                              { label: '网址', name: 'url', widget: 'string' }
                          ] }
                    ]
                }
            ]
        }
    });
</script>
</body>
</html>
